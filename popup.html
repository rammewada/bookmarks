<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0f0f0f; --ink-3: #6b6b6b; --ink-4: #a0a0a0;
      --surface: #fafaf8; --surface-2: #f2f1ee; --surface-3: #e8e6e1;
      --border: #e0ddd7; --accent: #1a1a2e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: 'Geist', -apple-system, sans-serif;
      background: var(--surface);
      color: var(--ink);
    }

    .header {
      background: var(--accent);
      padding: 22px 22px 20px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-name {
      font-family: 'Instrument Serif', serif;
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .body {
      padding: 20px 20px 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .stat-num {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-4);
      margin-top: 4px;
    }

    .open-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 12px;
      font-family: 'Geist', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.01em;
      transition: opacity 0.15s;
    }
    .open-btn:hover { opacity: 0.85; }

    .footer {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--ink-4);
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M3 2h10a1 1 0 011 1v10l-2.5-1.5L9 13l-1.5-1.5L6 13l-2.5-1.5L1 13V3a1 1 0 011-1z" stroke="white" stroke-width="1.3" stroke-linejoin="round"/>
          <path d="M5 6.5h6M5 9.5h4" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">Bookmark Organizer</div>
        <div class="logo-sub">Your bookmarks</div>
      </div>
    </div>
  </div>

  <div class="body">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="cnt-bm">—</div>
        <div class="stat-label">Bookmarks</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="cnt-folders">—</div>
        <div class="stat-label">Folders</div>
      </div>
    </div>

    <button class="open-btn" id="btn-open">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1.5h5.5v5.5M12.5 1.5l-7 7M1.5 8.5v4h4" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Open Organizer
    </button>

    <p class="footer">Read-only · bookmarks untouched</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
