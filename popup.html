<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --surface: #fafafa; --surface-thick: #f0f0f0;
      --ink: #111; --ink-dim: #666; --accent: #111;
      --border: #e0e0e0; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px; font-family: 'Inter', system-ui;
      background: var(--surface); color: var(--ink);
      padding: 24px;
    }

    .header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .logo {
      width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .title { font-family: 'Instrument Serif', serif; font-size: 20px; }

    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
    }
    .stat {
      background: var(--surface-thick); border: 1px solid var(--border);
      padding: 16px; border-radius: var(--radius); text-align: center;
    }
    .stat-num { font-family: 'Instrument Serif'; font-size: 28px; line-height: 1; }
    .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--ink-dim); margin-top: 4px; }

    .btn {
      width: 100%; padding: 12px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { opacity: 0.9; }

    .footer { margin-top: 16px; font-size: 11px; color: var(--ink-dim); text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2h10a1 1 0 011 1v10l-2.5-1.5L9 13l-1.5-1.5L6 13l-2.5-1.5L1 13V3a1 1 0 011-1z" stroke="white" stroke-width="1.3" stroke-linejoin="round"/></svg>
    </div>
    <div class="title">Organizer</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-count">—</div>
      <div class="stat-label">Links</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="folder-count">—</div>
      <div class="stat-label">Folders</div>
    </div>
  </div>

  <button class="btn" id="btn-open">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    Open Organizer
  </button>

  <p class="footer">Premium Offline Management</p>

  <script src="popup.js"></script>
</body>
</html>
